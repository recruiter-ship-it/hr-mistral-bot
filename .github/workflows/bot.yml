name: HR Mistral Bot 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Запуск каждые 6 часов: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Отменяем старый workflow при новом запуске
concurrency:
  group: hr-mistral-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355  # 6 часов - 5 минут запас

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js (for MCP servers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Create workspace directories
        run: |
          mkdir -p workspace/images
          mkdir -p workspace/audio
          mkdir -p workspace/documents
          mkdir -p workspace/memory

      - name: Run Bot with Auto-Restart
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "🚀 Starting HR Bot at $(date -u)"
          echo "⏰ Will run for ~6 hours until next scheduled restart"

          # Бесконечный цикл с автоматическим перезапуском
          while true; do
            echo "---"
            echo "[$(date -u)] Starting bot..."
            python bot.py 2>&1 || echo "[$(date -u)] Bot exited, restarting in 10 seconds..."
            sleep 10
          done
